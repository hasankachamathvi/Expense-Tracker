<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense Tracker</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>💰 Expense Tracker</h1>
            <p class="subtitle">Track your daily expenses efficiently</p>
        </header>

        <div class="main-content">
            <!-- Add Expense Form -->
            <section class="card">
                <h2>Add New Expense</h2>
                <form id="expenseForm">
                    <div class="form-group">
                        <label for="amount">Amount (₹)</label>
                        <input type="number" id="amount" name="amount" step="0.01" required>
                    </div>

                    <div class="form-group">
                        <label for="category">Category</label>
                        <select id="category" name="category" required>
                            <option value="">Select Category</option>
                            <option value="Food">🍔 Food</option>
                            <option value="Transport">🚗 Transport</option>
                            <option value="Shopping">🛍️ Shopping</option>
                            <option value="Entertainment">🎬 Entertainment</option>
                            <option value="Bills">📄 Bills</option>
                            <option value="Healthcare">🏥 Healthcare</option>
                            <option value="Education">📚 Education</option>
                            <option value="Other">📌 Other</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="description">Description</label>
                        <input type="text" id="description" name="description" required>
                    </div>

                    <div class="form-group">
                        <label for="date">Date</label>
                        <input type="date" id="date" name="date" required>
                    </div>

                    <button type="submit" class="btn btn-primary">Add Expense</button>
                </form>
            </section>

            <!-- View Expenses by Date -->
            <section class="card">
                <h2>View Expenses</h2>
                <div class="filter-section">
                    <div class="form-group">
                        <label for="filterDate">Filter by Date</label>
                        <input type="date" id="filterDate">
                    </div>
                    <button onclick="filterByDate()" class="btn btn-secondary">Filter</button>
                    <button onclick="loadAllExpenses()" class="btn btn-secondary">Show All</button>
                </div>

                <div id="expensesList" class="expenses-list">
                    <!-- Expenses will be loaded here -->
                </div>
            </section>

            <!-- Monthly Summary -->
            <section class="card">
                <h2>Monthly Summary</h2>
                <div class="filter-section">
                    <div class="form-group">
                        <label for="monthYear">Select Month</label>
                        <input type="month" id="monthYear">
                    </div>
                    <button onclick="loadMonthlySummary()" class="btn btn-secondary">Get Summary</button>
                </div>

                <div id="monthlySummary" class="summary-section">
                    <!-- Summary will be loaded here -->
                </div>
            </section>
        </div>
    </div>

    <script src="js/script.js"></script>
</body>
</html>
